<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garbaniphoro Grand Library</title>
  <link rel="stylesheet" href="css/main.css?v=4">
  <link rel="stylesheet" href="css/components.css?v=4">
  <style>
    body {
      margin: 0;
    }

    /* --- Hero: full viewport --- */
    .hero {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      overflow: hidden;
    }
    .hero-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 25%;
      z-index: 0;
    }
    /* Dark gradient overlay — heavier at bottom for readability */
    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom,
          rgba(20, 16, 10, 0.1) 0%,
          rgba(20, 16, 10, 0.05) 25%,
          rgba(20, 16, 10, 0.25) 55%,
          rgba(20, 16, 10, 0.6) 75%,
          rgba(20, 16, 10, 0.78) 90%,
          rgba(20, 16, 10, 0.88) 100%
        );
      pointer-events: none;
      z-index: 1;
    }

    /* --- Content overlay on the painting --- */
    .hero-content {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 600px;
      padding: 0 1.5rem 3.5rem;
      text-align: center;
    }

    .hero-title {
      font-family: var(--font-heading);
      font-size: 2.4rem;
      font-weight: 500;
      color: #e8e0d0;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    /* --- Search on painting --- */
    .hero-search {
      margin-bottom: 2.2rem;
    }
    .hero-search form {
      display: flex;
      gap: 0;
      max-width: 340px;
      margin: 0 auto;
    }
    .hero-search .search-input {
      background: rgba(255, 250, 240, 0.1);
      border-color: rgba(200, 185, 150, 0.25);
      color: #e8e0d0;
      backdrop-filter: blur(4px);
      font-family: var(--font-heading);
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      padding: 0.6rem 0.9rem;
    }
    .hero-search .search-input::placeholder {
      color: rgba(200, 185, 150, 0.4);
      font-family: var(--font-heading);
      letter-spacing: 0.08em;
    }
    .hero-search .search-input:focus {
      border-color: rgba(200, 185, 150, 0.6);
      background: rgba(255, 250, 240, 0.18);
    }
    .hero-search .search-btn {
      background: rgba(138, 109, 46, 0.6);
      border-color: rgba(138, 109, 46, 0.4);
      backdrop-filter: blur(4px);
      font-size: 0.75rem;
      padding: 0.6rem 1.2rem;
    }
    .hero-search .search-btn:hover {
      background: rgba(138, 109, 46, 0.9);
    }

    /* --- Directory entries on painting --- */
    .hero-directory {
      display: flex;
      justify-content: center;
      gap: 2.5rem;
    }
    .hero-dir-link {
      text-decoration: none;
      color: rgba(200, 185, 150, 0.6);
      font-family: var(--font-heading);
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      transition: color var(--transition);
      padding: 0.3rem 0;
    }
    .hero-dir-link:hover {
      color: #e8e0d0;
    }

    /* --- Painting credit --- */
    .painting-credit {
      position: absolute;
      bottom: 0.6rem;
      right: 1rem;
      z-index: 2;
      font-size: 0.58rem;
      color: rgba(200, 185, 150, 0.3);
      font-style: italic;
    }

    /* --- Colophon below hero --- */
    .colophon {
      padding: 1.5rem;
      font-size: 0.72rem;
      color: var(--text-muted);
      line-height: 1.8;
      text-align: center;
    }

    /* --- Responsive --- */
    @media (max-width: 768px) {
      .hero-title {
        font-size: 1.6rem;
        letter-spacing: 0.14em;
      }
      .hero-content {
        padding-bottom: 2.5rem;
      }
      .hero-directory {
        gap: 1.5rem;
        flex-wrap: wrap;
      }
      .hero-dir-link {
        font-size: 0.68rem;
      }
    }

    @media (max-width: 480px) {
      .hero-title {
        font-size: 1.3rem;
      }
      .hero-directory {
        gap: 1rem;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="site-logo">Garbaniphoro<br>Grand Library</a>
      <nav class="main-nav">
        <a href="index.html" class="nav-link active" data-i18n="nav.home">首页</a>
        <a href="stories.html" class="nav-link" data-i18n="nav.stories">公民辑录</a>
        <a href="search.html" class="nav-link" data-i18n="nav.search">检索</a>
        <a href="lore.html" class="nav-link" data-i18n="nav.lore">档案</a>
        <a href="gallery.html" class="nav-link" data-i18n="nav.gallery">画廊</a>
        <button class="lang-toggle" id="lang-toggle">EN</button>
      </nav>
    </div>
  </header>

  <!-- Hero: full viewport, everything on the painting -->
  <section class="hero">
    <img src="images/hero-lion-hunt.jpg"
         alt="Eugène Delacroix — The Lion Hunt, 1855"
         class="hero-img">

    <div class="hero-content">
      <h1 class="hero-title">Garbaniphoro Grand Library</h1>

      <div class="hero-search">
        <form onsubmit="window.location.href='search.html#q='+encodeURIComponent(this.q.value);return false;">
          <input type="text" name="q" class="search-input" placeholder="Search the archive…">
          <button type="submit" class="search-btn" data-i18n="search.button">检索</button>
        </form>
      </div>

      <nav class="hero-directory">
        <a href="stories.html" class="hero-dir-link" data-i18n="nav.stories">公民辑录</a>
        <a href="search.html" class="hero-dir-link" data-i18n="nav.search">检索</a>
        <a href="lore.html" class="hero-dir-link" data-i18n="nav.lore">档案</a>
        <a href="gallery.html" class="hero-dir-link" data-i18n="nav.gallery">画廊</a>
      </nav>
    </div>

    <span class="painting-credit">Eugène Delacroix, <em>The Lion Hunt</em>, 1855</span>
  </section>

  <footer class="colophon">
    <p>A fan-made archive for Castrum Kremnos.</p>
  </footer>

  <script type="module" src="js/app.mjs?v=5"></script>
</body>
</html>
